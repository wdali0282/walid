<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Moderne</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #0f172a;
    }

    /* IMAGE DE FOND STYLÉE + TRANSPARENCE */
    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('background.png') center/cover no-repeat;
      opacity: 0.25;
      filter: blur(2px) saturate(1.2);
      transform: scale(1.1);
      z-index: -2;
    }

    /* OVERLAY GRADIENT MODERNE */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, rgba(0, 200, 255, 0.15), transparent 50%),
                  radial-gradient(circle at bottom, rgba(140, 0, 255, 0.15), transparent 60%);
      z-index: -1;
    }

    .container {
      text-align: center;
      color: white;
      padding: 50px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.8;
    }

    button {
      padding: 15px 35px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #00c6ff, #7b2ff7);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>présentation de la meilleur IA</h1>
    <p>cette IA est en collaboration avec mon camarade Siloe</p>
    <a href="https://siloai.site/">
    <button onclick="redirect()">Accéder</button>
    </a>
  </div>

  <script>
    function redirect() {
      window.location.href = "page2.html";
    }
  </script>

</body>
</html>
