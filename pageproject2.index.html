<style>
     .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(0,255,255,0.2);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

     * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      position: fixed;
      width: 100%;
      z-index: 1000;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-weight: 700;
      letter-spacing: 2px;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: white;
      font-weight: 400;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00f7ff;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #000000, #1a1a1a);
    }

    .hero h2 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    
    .btn {
      padding: 12px 25px;
      border: none;
      background: #00f7ff;
      color: black;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00f7ff;
    }

    .collection {
      padding: 100px 50px;
    }

    .collection h3 {
      text-align: center;
      margin-bottom: 50px;
      font-size: 2rem;
    }

   

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.5;
    }
</style>
