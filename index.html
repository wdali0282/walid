<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLD - Mon Projet</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      color: white;
      overflow: hidden;
    }

    /* IMAGE DE FOND */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://i.redd.it/wdakf9dunnya1.jpg') center/cover no-repeat;
      z-index: -2;
    }

    /* FILTRE SOMBRE */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    header {
      position: absolute;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      font-weight: 600;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .hero h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .hero p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 30px;
      border-radius: 30px;
      border: none;
      background: #00e0ff;
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00e0ff;
    }

  </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <div>WLD</div>
  <div>Project</div>
</header>

<section class="hero">
  <h1>MON SITE WEB</h1>
  <p>Découvrez mon project</p>
  <a href="pageproject2.index.html">
  <button class="btn">VOIR LE PROJECT</button>
  </a>
</section>

</body>
</html>
